<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ivan Alexander Zapata — Photos</title>
<meta name="description" content="Photo shoots and albums by Ivan Alexander Zapata.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700;800&family=Sora:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>

  :root{
    --void:#0A0605;
    --ink:#050302;
    --panel: rgba(255,255,255,0.06);
    --crimson:#9E1B32;
    --scarlet:#E63946;
    --gold:#D4AF37;
    --bronze:#8C5A1E;
    --paper:#F4ECD8;
    --paper-dim: rgba(244,236,216,0.72);
    --font-display:'Unbounded', sans-serif;
    --font-body:'Sora', sans-serif;
    --font-mono:'Space Mono', monospace;
    --accent-current: var(--scarlet);
  }

  *{ box-sizing:border-box; }
  html, body{ height:100%; margin:0; background:var(--void); }
  body{
    color:var(--paper);
    font-family:var(--font-body);
    -webkit-font-smoothing:antialiased;
    scroll-snap-type:y proximity;
    overflow-y:scroll;
    scroll-behavior:smooth;
  }
  @media (prefers-reduced-motion: reduce){
    body{ scroll-snap-type:none; scroll-behavior:auto; }
    *, *::before, *::after{ animation:none !important; transition-duration:0.001ms !important; }
  }

  img{ max-width:100%; display:block; }
  ::selection{ background:var(--scarlet); color:var(--ink); }
  *:focus-visible{ outline:2px solid var(--gold); outline-offset:3px; }

  /* ===== Slide base ===== */
  .slide{
    position:relative;
    height:100vh;
    width:100%;
    overflow:hidden;
    scroll-snap-align:start;
    display:flex;
  }
  .slide.tall{ height:auto; min-height:100vh; }

  .slide-bg-wrap{ position:absolute; inset:-24px; transition:transform .6s cubic-bezier(.22,1,.36,1); }
  .slide-bg{
    position:absolute; inset:0;
    background-size:cover; background-position:center;
    will-change:opacity, transform;
  }
  .slide-bg-video{
    position:absolute; inset:0;
    width:100%; height:100%;
    object-fit:cover; object-position:center;
    will-change:opacity, transform;
  }

  .slide-wash{
    position:absolute; inset:0;
    mix-blend-mode:soft-light;
    opacity:.6;
  }
  .slide-shade{
    position:absolute; inset:0;
    background:linear-gradient(180deg, rgba(5,3,2,0.10) 35%, rgba(5,3,2,0.94) 100%);
  }

  [data-accent="crimson"] .slide-wash{ background:radial-gradient(circle at 25% 20%, var(--scarlet), transparent 60%), radial-gradient(circle at 80% 80%, var(--crimson), transparent 55%); }
  [data-accent="gold"] .slide-wash{ background:radial-gradient(circle at 75% 25%, var(--gold), transparent 60%), radial-gradient(circle at 20% 80%, var(--bronze), transparent 55%); }

  .slide-mesh{
    position:absolute; inset:0;
    background-size:200% 200%;
    animation:meshShift 14s ease-in-out infinite alternate;
    will-change:opacity, transform;
  }
  @keyframes meshShift{ 0%{ background-position:0% 0%; } 100%{ background-position:100% 100%; } }
  .mesh-crimson{ background-image:radial-gradient(circle at 20% 30%, var(--scarlet), transparent 55%), radial-gradient(circle at 80% 75%, var(--crimson), transparent 55%); }
  .mesh-gold{ background-image:radial-gradient(circle at 75% 25%, var(--gold), transparent 55%), radial-gradient(circle at 25% 80%, var(--bronze), transparent 55%); }

  .mesh-spectrum-wrap{ position:absolute; inset:-35%; will-change:opacity, transform; }
  .mesh-spectrum{
    position:absolute; inset:0;
    background:conic-gradient(from 0deg, var(--crimson), var(--scarlet), var(--gold), var(--bronze), var(--ink), var(--crimson));
    filter:saturate(1.1) blur(70px) brightness(.62);
    animation:spin 44s linear infinite;
  }
  @keyframes spin{ to{ transform:rotate(360deg); } }

  /* ===== Slide content ===== */
  .slide-content{
    position:relative; z-index:3;
    margin-top:auto;
    padding:0 8vw 9vh;
    max-width:760px;
    will-change:opacity, transform;
  }
  .slide-content.center{
    margin:auto;
    text-align:center;
    padding:8vh 8vw;
    display:flex; flex-direction:column; align-items:center;
  }

  .eyebrow{
    font-family:var(--font-mono);
    font-size:12.5px; letter-spacing:.16em; text-transform:uppercase;
    color:var(--paper-dim);
    margin-bottom:14px;
  }
  .slide-title{
    font-family:var(--font-display);
    font-weight:700;
    font-size:clamp(30px,5vw,56px);
    line-height:1.05;
    margin:0 0 14px;
  }
  .slide-desc{
    font-size:16.5px;
    color:var(--paper-dim);
    max-width:480px;
    margin:0 auto;
  }
  .center .slide-desc{ margin-left:auto; margin-right:auto; }

  .hero-title{
    font-family:var(--font-display);
    font-weight:800;
    font-size:clamp(40px,9vw,104px);
    line-height:1;
    margin:10px 0 4px;
    background:linear-gradient(90deg, var(--scarlet), var(--crimson), var(--gold), var(--bronze), var(--scarlet));
    background-size:300% 100%;
    -webkit-background-clip:text; background-clip:text; color:transparent;
    animation:gradientShift 8s ease-in-out infinite;
  }
  @keyframes gradientShift{ 0%,100%{ background-position:0% 50%; } 50%{ background-position:100% 50%; } }

  .btn-row{ display:flex; gap:14px; flex-wrap:wrap; justify-content:center; margin-top:8px; }
  .btn{
    font-family:var(--font-mono); font-size:13px; letter-spacing:.04em;
    padding:14px 28px; border-radius:40px; cursor:pointer;
    text-decoration:none; display:inline-flex; align-items:center; gap:8px;
    border:1.5px solid rgba(244,236,216,0.35);
    transition:transform .25s ease, border-color .25s ease, background .25s ease;
  }
  .btn-primary{ background:var(--paper); color:var(--ink); border-color:var(--paper); }
  .btn-primary:hover{ transform:translateY(-3px) scale(1.03); }
  .btn-ghost{ color:var(--paper); background:rgba(255,255,255,0.06); }
  .btn-ghost:hover{ transform:translateY(-3px); border-color:var(--gold); color:var(--gold); }

  .scroll-hint{
    margin-top:44px;
    font-family:var(--font-mono); font-size:11.5px; letter-spacing:.12em; color:var(--paper-dim);
    display:flex; flex-direction:column; align-items:center; gap:8px;
  }
  .chevron{ animation:bob 1.8s ease-in-out infinite; }
  @keyframes bob{ 0%,100%{ transform:translateY(0); opacity:.5; } 50%{ transform:translateY(8px); opacity:1; } }

  /* ===== About Me (photo + text side by side) ===== */
  .about-grid{
    display:flex; gap:48px; align-items:center;
    max-width:100%;
  }
  .about-photo{
    flex:0 0 240px;
    border-radius:16px; overflow:hidden;
    border:1px solid rgba(244,236,216,0.18);
    box-shadow:0 24px 60px rgba(0,0,0,.5);
  }
  .about-photo img{ width:240px; height:300px; object-fit:cover; display:block; }
  .about-text{ flex:1; min-width:240px; text-align:left; }
  .about-text .bio-text{ max-width:none; }
  @media (max-width:720px){
    .about-grid{ flex-direction:column; }
    .about-photo{ flex:0 0 auto; }
    .about-photo img{ width:200px; height:240px; }
    .about-text{ text-align:center; }
  }

  /* ===== Video / sound card ===== */
  .video-frame{
    width:100%; max-width:520px; aspect-ratio:16/9; border-radius:18px;
    overflow:hidden; background:#000; position:relative;
    box-shadow:0 30px 80px rgba(0,0,0,.6);
    margin:26px auto 0;
  }
  .video-frame.lg{ max-width:min(960px, 92vw); }
  .video-frame video, .video-frame iframe{ width:100%; height:100%; border:0; display:block; background:#000; }
  .play-btn{
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    width:62px; height:62px; border-radius:50%;
    background:rgba(5,3,2,0.6); border:1.5px solid rgba(244,236,216,0.55);
    color:var(--paper); font-size:18px; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    transition:background .25s ease, transform .25s ease;
  }
  .play-btn:hover{ background:var(--scarlet); border-color:var(--scarlet); transform:translate(-50%,-50%) scale(1.08); }
  .play-btn.hidden{ display:none; }

  /* ===== About text ===== */
  .bio-text{ color:var(--paper-dim); font-size:15.5px; max-width:560px; }
  .bio-text strong{ color:var(--paper); }

  /* ===== Contact pills (hero) ===== */
  .contact-card{
    display:flex; flex-direction:column; align-items:center; gap:4px;
    background:var(--panel); border:1px solid rgba(244,236,216,0.18);
    padding:16px 26px; border-radius:14px; text-decoration:none;
    transition:transform .25s ease, border-color .25s ease;
  }
  .contact-card:hover{ transform:translateY(-3px); border-color:var(--gold); }
  .ct-label{ font-family:var(--font-mono); font-size:10.5px; color:var(--paper-dim); letter-spacing:.1em; }
  .ct-value{ font-family:var(--font-display); font-weight:600; font-size:15px; }

  /* ===== Fixed UI: counter + dots ===== */
  #counter{
    position:fixed; left:24px; bottom:22px; z-index:60;
    font-family:var(--font-mono); font-size:12px; color:var(--paper-dim);
    letter-spacing:.06em;
  }
  #counter span{ color:var(--paper); }

  #dots{
    position:fixed; right:22px; top:50%; transform:translateY(-50%); z-index:60;
    display:flex; flex-direction:column; gap:10px;
  }
  .dot{
    width:8px; height:8px; border-radius:50%; padding:0; border:none; cursor:pointer;
    background:rgba(244,236,216,0.28);
    transition:transform .3s ease, background .3s ease;
  }
  .dot.active{ background:var(--accent-current); transform:scale(1.5); }
  @media (max-width:640px){ #dots{ display:none; } #counter{ left:18px; bottom:16px; } }

  .album-label{ font-size:11px; }

  /* ===== Top-left social bar ===== */
  #social-bar{
    position:fixed; top:20px; left:24px; z-index:70;
    display:flex; gap:10px;
  }
  #social-bar a{
    width:36px; height:36px; border-radius:50%;
    background:rgba(5,3,2,0.55);
    border:1px solid rgba(244,236,216,0.25);
    display:flex; align-items:center; justify-content:center;
    color:var(--paper);
    backdrop-filter:blur(6px);
    transition:transform .25s ease, border-color .25s ease, background .25s ease;
  }
  #social-bar a:hover{
    transform:translateY(-2px) scale(1.08);
    border-color:var(--gold);
    background:rgba(212,175,55,0.18);
  }
  #social-bar svg{ width:16px; height:16px; fill:currentColor; }
  @media (max-width:560px){
    #social-bar{ top:14px; left:14px; gap:8px; }
    #social-bar a{ width:32px; height:32px; }
    #social-bar svg{ width:14px; height:14px; }
  }


  /* ===== Hub navigation cards (index hub slide) ===== */
  .hub-grid{
    display:flex; gap:20px; flex-wrap:wrap; justify-content:center;
    margin-top:32px; width:100%; max-width:820px;
  }
  .hub-card{
    flex:1 1 220px; min-width:200px;
    background:var(--panel); border:1px solid rgba(244,236,216,0.18);
    border-radius:16px; padding:30px 26px; text-decoration:none; color:inherit;
    display:flex; flex-direction:column; gap:6px; text-align:left;
    transition:transform .25s ease, border-color .25s ease, background .25s ease;
  }
  .hub-card:hover, .hub-card:focus-visible{
    transform:translateY(-6px); border-color:var(--gold); background:rgba(255,255,255,0.09);
  }
  .hub-card-label{ font-family:var(--font-display); font-weight:700; font-size:23px; }
  .hub-card-sub{ font-family:var(--font-body); font-size:13.5px; color:var(--paper-dim); }
  .hub-card-arrow{ font-family:var(--font-mono); font-size:12px; color:var(--gold); margin-top:12px; letter-spacing:.04em; }

  /* ===== Back to home (subpages) ===== */
  #back-home{
    position:fixed; top:20px; right:24px; z-index:70;
    font-family:var(--font-mono); font-size:12px; letter-spacing:.06em;
    background:rgba(5,3,2,0.55); border:1px solid rgba(244,236,216,0.25);
    color:var(--paper); padding:10px 18px; border-radius:30px;
    text-decoration:none; backdrop-filter:blur(6px);
    transition:transform .25s ease, border-color .25s ease, background .25s ease;
  }
  #back-home:hover{ transform:translateY(-2px); border-color:var(--gold); background:rgba(212,175,55,0.18); }
  @media (max-width:560px){ #back-home{ top:14px; right:14px; padding:8px 14px; font-size:11px; } }

  /* ===== Photo carousel (per-album, horizontal infinite swipe) ===== */
  .carousel-slide{
    padding:0;
    flex-direction:column;
    display:flex;
  }
  .album-header{
    position:relative; z-index:5;
    text-align:center;
    padding:4vh 8vw 1vh;
  }
  .album-header .eyebrow{ justify-content:center; display:flex; }
  .album-title{
    font-family:var(--font-display); font-weight:700;
    font-size:clamp(30px,5vw,52px);
    margin:0;
  }
  .carousel-shell{
    position:relative;
    width:100%; flex:1; min-height:0;
    display:flex; align-items:center; justify-content:center;
  }
  .carousel-track{
    display:flex;
    width:100%; height:100%;
    overflow-x:auto; overflow-y:hidden;
    scroll-snap-type:x mandatory;
    -webkit-overflow-scrolling:touch;
    scrollbar-width:none;
  }
  .carousel-track::-webkit-scrollbar{ display:none; }
  .carousel-item{
    flex:0 0 100%;
    width:100%; height:100%;
    scroll-snap-align:start;
    scroll-snap-stop:always;
    position:relative;
    display:flex; align-items:flex-end;
    overflow:hidden;
  }
  .carousel-item img{
    position:absolute; inset:0;
    width:100%; height:100%;
    object-fit:cover; object-position:center;
  }
  .carousel-item .item-shade{
    position:absolute; inset:0;
    background:linear-gradient(180deg, rgba(5,3,2,0.05) 40%, rgba(5,3,2,0.92) 100%);
  }
  .carousel-item .item-caption{
    position:relative; z-index:2;
    padding:0 8vw 6vh;
  }
  .carousel-item .item-eyebrow{
    font-family:var(--font-mono); font-size:11.5px; letter-spacing:.14em; text-transform:uppercase;
    color:var(--paper-dim);
  }

  .carousel-arrow{
    position:absolute; top:50%; transform:translateY(-50%); z-index:20;
    width:52px; height:52px; border-radius:50%;
    background:rgba(5,3,2,0.5); border:1px solid rgba(244,236,216,0.3);
    color:var(--paper); font-size:22px; cursor:pointer; line-height:1;
    display:flex; align-items:center; justify-content:center;
    transition:background .25s ease, border-color .25s ease, transform .25s ease;
  }
  .carousel-arrow:hover{ background:rgba(212,175,55,0.22); border-color:var(--gold); transform:translateY(-50%) scale(1.06); }
  .carousel-arrow.left{ left:20px; }
  .carousel-arrow.right{ right:20px; }
  @media (max-width:640px){ .carousel-arrow{ width:42px; height:42px; font-size:18px; } .carousel-arrow.left{ left:10px; } .carousel-arrow.right{ right:10px; } }


  /* ===== Page menu dropdown ===== */
  #page-menu{
    position:fixed; top:20px; right:24px; z-index:80;
    font-family:var(--font-mono);
  }
  #page-menu-btn{
    width:42px; height:42px; border-radius:50%;
    background:rgba(5,3,2,0.55); border:1px solid rgba(244,236,216,0.25);
    cursor:pointer; backdrop-filter:blur(6px);
    display:flex; flex-direction:column; gap:5px; align-items:center; justify-content:center;
    padding:0;
    transition:transform .25s ease, border-color .25s ease, background .25s ease;
  }
  #page-menu-btn span{ display:block; width:18px; height:2px; background:var(--paper); border-radius:2px; }
  #page-menu-btn:hover{ transform:translateY(-2px); border-color:var(--gold); background:rgba(212,175,55,0.18); }
  #page-menu-list{
    position:absolute; right:0; top:calc(100% + 8px);
    min-width:170px;
    background:rgba(10,6,5,0.95); border:1px solid rgba(244,236,216,0.2);
    border-radius:14px; overflow:hidden;
    backdrop-filter:blur(8px);
    display:none;
    box-shadow:0 20px 50px rgba(0,0,0,.5);
  }
  #page-menu.open #page-menu-list{ display:block; }
  #page-menu-list a{
    display:block; padding:13px 18px;
    font-size:12px; letter-spacing:.06em;
    color:var(--paper); text-decoration:none;
    border-bottom:1px solid rgba(244,236,216,0.08);
    transition:background .2s ease, color .2s ease;
  }
  #page-menu-list a:last-child{ border-bottom:none; }
  #page-menu-list a:hover{ background:rgba(212,175,55,0.15); color:var(--gold); }
  #page-menu-list a.current{ color:var(--gold); pointer-events:none; }
  @media (max-width:560px){
    #page-menu{ top:14px; right:14px; }
    #page-menu-btn{ width:36px; height:36px; gap:4px; }
    #page-menu-btn span{ width:15px; }
  }

</style>
</head>

<!-- 1b PHOTOS — title slide with looping video background -->
  <section class="slide no-photo" data-accent="gold" id="s1b">
    <div class="slide-bg-wrap">
      <video class="slide-bg-video bg-layer" autoplay muted loop playsinline preload="auto">
        <source src="PHOTOS_BACKGROUND_FILENAME.mp4" type="video/mp4">
      </video>
    </div>
    <div class="slide-wash"></div><div class="slide-shade"></div>
    <div class="slide-content center">
      <h2 class="slide-title" style="font-size:clamp(40px,7vw,84px);">Photos</h2>
    </div>
  </section>

<!-- 2 DANTE'S RETREAT — album carousel -->
  <section class="slide no-photo carousel-slide" data-accent="crimson" id="s2">
    <div class="album-header">
      <div class="eyebrow">ALBUM · 01</div>
      <h2 class="album-title">Dante's Retreat</h2>
    </div>
    <div class="carousel-shell">
      <button class="carousel-arrow left" data-carousel="dante" data-dir="-1" aria-label="Previous photo">‹</button>
      <div class="carousel-track" id="track-dante"></div>
      <button class="carousel-arrow right" data-carousel="dante" data-dir="1" aria-label="Next photo">›</button>
    </div>
  </section>

<!-- 3 MILK & HONEY — album carousel -->
  <section class="slide no-photo carousel-slide" data-accent="gold" id="s3">
    <div class="album-header">
      <div class="eyebrow">ALBUM · 02</div>
      <h2 class="album-title">Milk &amp; Honey</h2>
    </div>
    <div class="carousel-shell">
      <button class="carousel-arrow left" data-carousel="honey" data-dir="-1" aria-label="Previous photo">‹</button>
      <div class="carousel-track" id="track-honey"></div>
      <button class="carousel-arrow right" data-carousel="honey" data-dir="1" aria-label="Next photo">›</button>
    </div>
  </section>

<!-- 4 MOONLIGHT — album carousel -->
  <section class="slide no-photo carousel-slide" data-accent="crimson" id="s4">
    <div class="album-header">
      <div class="eyebrow">ALBUM · 03</div>
      <h2 class="album-title">Moonlight</h2>
    </div>
    <div class="carousel-shell">
      <button class="carousel-arrow left" data-carousel="moon" data-dir="-1" aria-label="Previous photo">‹</button>
      <div class="carousel-track" id="track-moon"></div>
      <button class="carousel-arrow right" data-carousel="moon" data-dir="1" aria-label="Next photo">›</button>
    </div>
  </section>

  <script>
(function(){
  var reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  var isFinePointer = window.matchMedia('(pointer: fine)').matches;

  var accentMap = {
    crimson:'#E63946', gold:'#D4AF37', spectrum:'#D4AF37'
  };

  var slides = Array.prototype.slice.call(document.querySelectorAll('.slide'));
  var counterCurrent = document.getElementById('counterCurrent');
  var counterTotal = document.getElementById('counterTotal');
  var dotsWrap = document.getElementById('dots');

  counterTotal.textContent = String(slides.length).padStart(2,'0');

  slides.forEach(function(slide, i){
    var dot = document.createElement('button');
    dot.className = 'dot';
    dot.setAttribute('aria-label', 'Go to section ' + (i+1));
    dot.addEventListener('click', function(){
      slide.scrollIntoView({ behavior: reduceMotion ? 'auto' : 'smooth', block:'start' });
    });
    dotsWrap.appendChild(dot);
  });
  var dots = Array.prototype.slice.call(dotsWrap.children);

  function setActiveUI(index){
    dots.forEach(function(d, i){ d.classList.toggle('active', i === index); });
    counterCurrent.textContent = String(index+1).padStart(2,'0');
    var accent = slides[index].dataset.accent;
    document.documentElement.style.setProperty('--accent-current', accentMap[accent] || accentMap.crimson);
  }

  /* ---- Continuous, scroll-coupled crossfade (seamless), overlap-based so it works for slides taller than one viewport too ---- */
  if(reduceMotion){
    slides.forEach(function(slide){
      var bg = slide.querySelector('.bg-layer');
      if(bg){ bg.style.opacity = 1; }
      var content = slide.querySelector('.slide-content');
      if(content){ content.style.opacity = 1; content.style.transform = 'none'; }
    });
    setActiveUI(0);
  } else {
    var ticking = false;

    function updateFrame(){
      var vh = window.innerHeight;
      var bestIndex = 0, bestRatio = -1;

      slides.forEach(function(slide, i){
        var rect = slide.getBoundingClientRect();
        var overlap = Math.min(rect.bottom, vh) - Math.max(rect.top, 0);
        var ratio = Math.max(0, Math.min(1, overlap / vh));

        var bg = slide.querySelector('.bg-layer');
        if(bg){
          bg.style.opacity = ratio;
          var scale = 1.05 + (1 - ratio) * 0.06;
          bg.style.transform = 'scale(' + scale + ')';
        }
        var content = slide.querySelector('.slide-content');
        if(content){
          content.style.opacity = ratio;
          content.style.transform = 'translateY(' + ((1 - ratio) * 26) + 'px)';
        }
        if(ratio > bestRatio){ bestRatio = ratio; bestIndex = i; }
      });

      setActiveUI(bestIndex);
      ticking = false;
    }

    function onScroll(){
      if(!ticking){ requestAnimationFrame(updateFrame); ticking = true; }
    }
    window.addEventListener('scroll', onScroll, { passive:true });
    window.addEventListener('resize', updateFrame);
    updateFrame();
  }

  /* Keyboard navigation */
  document.addEventListener('keydown', function(e){
    var current = parseInt(counterCurrent.textContent, 10) - 1;
    if(e.key === 'ArrowDown' || e.key === 'PageDown'){
      e.preventDefault();
      var next = Math.min(slides.length-1, current+1);
      slides[next].scrollIntoView({ behavior: reduceMotion ? 'auto' : 'smooth', block:'start' });
    } else if(e.key === 'ArrowUp' || e.key === 'PageUp'){
      e.preventDefault();
      var prev = Math.max(0, current-1);
      slides[prev].scrollIntoView({ behavior: reduceMotion ? 'auto' : 'smooth', block:'start' });
    }
  });

  /* Subtle parallax on photo slides */
  if(!reduceMotion && isFinePointer){
    document.addEventListener('mousemove', function(e){
      var activeWrap = null, bestRatio = -1;
      document.querySelectorAll('.slide-bg-wrap').forEach(function(wrap){
        var rect = wrap.parentElement.getBoundingClientRect();
        var vh = window.innerHeight;
        var overlap = Math.min(rect.bottom, vh) - Math.max(rect.top, 0);
        var ratio = Math.max(0, Math.min(1, overlap / vh));
        if(ratio > bestRatio){ bestRatio = ratio; activeWrap = wrap; }
      });
      if(!activeWrap || bestRatio < 0.4) return;
      var x = (e.clientX/window.innerWidth - 0.5) * 18;
      var y = (e.clientY/window.innerHeight - 0.5) * 18;
      activeWrap.style.transform = 'translate('+x+'px,'+y+'px)';
    });
  }

  /* Video play buttons */
  document.querySelectorAll('.video-frame').forEach(function(box){
    var video = box.querySelector('video');
    var btn = box.querySelector('.play-btn');
    if(!video || !btn) return;
    btn.addEventListener('click', function(){ video.play(); });
    video.addEventListener('play', function(){ btn.classList.add('hidden'); });
    video.addEventListener('pause', function(){ btn.classList.remove('hidden'); });
    video.addEventListener('ended', function(){ btn.classList.remove('hidden'); });
  });

  /* ---- Per-album photo carousels: each loops infinitely via tripled clone set ---- */
  var albums = {
    dante: {
      name: "Dante's Retreat",
      photos: ["Dante%27s-Retreat-2.jpg", "Dante%27s-Retreat-23.jpg", "Dante.png"]
    },
    honey: {
      name: "Milk & Honey",
      photos: ["milk-honey-1.jpg", "milk-honey-2.jpg", "milk-honey-3.jpg"]
    },
    moon: {
      name: "Moonlight",
      photos: ["Moonlight-1.jpg", "Moonlight-2.jpg"]
    }
  };

  var carousels = {};

  function initCarousel(key){
    var album = albums[key];
    var track = document.getElementById('track-' + key);
    if(!album || !track) return;

    var N = album.photos.length;

    function buildItemEl(src, idx){
      var el = document.createElement('div');
      el.className = 'carousel-item';
      el.innerHTML =
        '<img src="' + src + '" alt="' + album.name + ' photo ' + (idx+1) + '">' +
        '<div class="item-shade"></div>' +
        '<div class="item-caption">' +
          '<div class="item-eyebrow">' + (idx+1) + ' / ' + N + '</div>' +
        '</div>';
      return el;
    }

    // Tripled set: [clone][real][clone] for a seamless infinite loop.
    for(var copy = 0; copy < 3; copy++){
      album.photos.forEach(function(src, idx){
        track.appendChild(buildItemEl(src, idx));
      });
    }

    var itemWidth = 0;
    var jumping = false;

    function measure(){ itemWidth = track.clientWidth; }

    function setInstant(scrollLeftValue){
      jumping = true;
      track.style.scrollBehavior = 'auto';
      track.scrollLeft = scrollLeftValue;
      requestAnimationFrame(function(){
        track.style.scrollBehavior = '';
        jumping = false;
      });
    }

    measure();
    setInstant(N * itemWidth);

    window.addEventListener('resize', function(){
      var currentIndex = Math.round(track.scrollLeft / (itemWidth || 1));
      measure();
      setInstant(currentIndex * itemWidth);
    });

    var scrollTimer = null;
    track.addEventListener('scroll', function(){
      if(jumping) return;
      if(scrollTimer) clearTimeout(scrollTimer);
      scrollTimer = setTimeout(function(){
        if(!itemWidth) return;
        var index = Math.round(track.scrollLeft / itemWidth);
        if(index < N){
          setInstant((index + N) * itemWidth);
        } else if(index >= N * 2){
          setInstant((index - N) * itemWidth);
        }
      }, 120);
    }, { passive:true });

    carousels[key] = {
      step: function(dir){
        if(!itemWidth) measure();
        track.scrollBy({ left: dir * itemWidth, behavior: reduceMotion ? 'auto' : 'smooth' });
      },
      track: track
    };
  }

  Object.keys(albums).forEach(initCarousel);

  document.querySelectorAll('.carousel-arrow').forEach(function(btn){
    btn.addEventListener('click', function(){
      var c = carousels[btn.dataset.carousel];
      if(c){ c.step(parseInt(btn.dataset.dir, 10)); }
    });
  });

  // Arrow keys steer whichever album carousel is currently on screen
  document.addEventListener('keydown', function(e){
    if(e.key !== 'ArrowLeft' && e.key !== 'ArrowRight') return;
    var best = null, bestRatio = -1;
    Object.keys(carousels).forEach(function(key){
      var rect = carousels[key].track.getBoundingClientRect();
      var vh = window.innerHeight;
      var overlap = Math.min(rect.bottom, vh) - Math.max(rect.top, 0);
      var ratio = Math.max(0, overlap / vh);
      if(ratio > bestRatio){ bestRatio = ratio; best = carousels[key]; }
    });
    if(best && bestRatio > 0.3){
      best.step(e.key === 'ArrowRight' ? 1 : -1);
    }
  });
/* Page menu dropdown */
  var pageMenu = document.getElementById('page-menu');
  var pageMenuBtn = document.getElementById('page-menu-btn');
  if(pageMenu && pageMenuBtn){
    pageMenuBtn.addEventListener('click', function(e){
      e.stopPropagation();
      var isOpen = pageMenu.classList.toggle('open');
      pageMenuBtn.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
    });
    document.addEventListener('click', function(e){
      if(pageMenu.classList.contains('open') && !pageMenu.contains(e.target)){
        pageMenu.classList.remove('open');
        pageMenuBtn.setAttribute('aria-expanded', 'false');
      }
    });
    document.addEventListener('keydown', function(e){
      if(e.key === 'Escape' && pageMenu.classList.contains('open')){
        pageMenu.classList.remove('open');
        pageMenuBtn.setAttribute('aria-expanded', 'false');
      }
    });
  }
})();
</script>
</body>
</html>
